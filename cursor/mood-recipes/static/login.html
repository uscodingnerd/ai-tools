<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Montserrat", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .login-bg {
        min-height: 100vh;
        background: linear-gradient(
          180deg,
          #d946ef 0%,
          #a21caf 22%,
          #7c3aed 55%,
          #a78bfa 82%,
          #c4d4ff 100%
        );
      }
      .login-btn {
        display: block;
        width: 100%;
        margin-top: 2rem;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="login-bg flex items-center justify-center px-5 py-8 font-sans antialiased">
    <div
      class="w-full max-w-[400px] rounded-[28px] border border-white/35 bg-white/[0.06] px-8 pb-9 pt-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)] backdrop-blur-[2px]"
    >
      <h1 id="page-title" class="mb-7 text-center text-[26px] font-bold tracking-tight text-white">Login</h1>

      <div
        id="msg-global"
        class="mb-4 hidden rounded-lg border border-white/30 bg-white/10 px-3 py-2 text-center text-[13px] text-white"
        role="alert"
      ></div>

      <div id="panel-login">
        <form id="form-login" class="space-y-0" autocomplete="on">
          <div class="mb-6">
            <label for="login-email" class="mb-2 block text-[15px] font-medium text-white">Email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              required
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white placeholder-white/50 outline-none ring-0 transition focus:border-white"
            />
          </div>
          <div class="mb-5">
            <label for="login-password" class="mb-2 block text-[15px] font-medium text-white">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              required
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white placeholder-white/50 outline-none ring-0 transition focus:border-white"
            />
          </div>
          <div class="flex items-center justify-between gap-4 py-4">
            <label class="flex cursor-pointer items-center gap-2.5 select-none">
              <input
                type="checkbox"
                name="remember"
                class="h-[17px] w-[17px] shrink-0 cursor-pointer rounded-sm border-2 border-white bg-transparent accent-white focus:outline-none focus:ring-2 focus:ring-white/50"
              />
              <span class="text-[14px] font-medium text-white">Remember Me</span>
            </label>
            <button
              type="button"
              id="link-forgot"
              class="whitespace-nowrap border-0 bg-transparent text-[14px] font-semibold text-white transition hover:text-white/90"
            >
              Forget Password
            </button>
          </div>
          <button
            type="submit"
            class="login-btn w-full rounded-full bg-white py-3 text-[15px] font-bold tracking-wide text-[#1a0a2e] shadow-sm transition hover:bg-white/95 focus:outline-none focus:ring-2 focus:ring-white/60 focus:ring-offset-2 focus:ring-offset-transparent"
          >
            Log in
          </button>
        </form>
        <p class="mt-7 text-center text-[14px] text-white">
          Don't have an account
          <button
            type="button"
            id="link-register"
            class="font-bold text-white underline-offset-2 hover:underline"
          >
            Register
          </button>
        </p>
      </div>

      <div id="panel-register" class="hidden">
        <form id="form-register" class="space-y-0" autocomplete="on">
          <div class="mb-6">
            <label for="reg-email" class="mb-2 block text-[15px] font-medium text-white">Email</label>
            <input
              id="reg-email"
              type="email"
              required
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
            />
          </div>
          <div class="mb-5">
            <label for="reg-password" class="mb-2 block text-[15px] font-medium text-white">Password</label>
            <input
              id="reg-password"
              type="password"
              required
              minlength="8"
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
            />
          </div>
          <div class="mb-5">
            <label for="reg-password2" class="mb-2 block text-[15px] font-medium text-white"
              >Confirm password</label
            >
            <input
              id="reg-password2"
              type="password"
              required
              minlength="8"
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
            />
          </div>
          <button
            type="submit"
            class="login-btn w-full rounded-full bg-white py-3 text-[15px] font-bold tracking-wide text-[#1a0a2e] shadow-sm transition hover:bg-white/95 focus:outline-none focus:ring-2 focus:ring-white/60"
          >
            Create account
          </button>
        </form>
        <p class="mt-7 text-center text-[14px] text-white">
          Already have an account?
          <button type="button" id="link-back-login-from-reg" class="font-bold underline-offset-2 hover:underline">
            Log in
          </button>
        </p>
      </div>

      <div id="panel-forgot" class="hidden">
        <p class="mb-4 text-center text-[14px] text-white/90">
          Enter your email and we’ll send reset instructions if the account exists.
        </p>
        <form id="form-forgot" class="space-y-0">
          <div class="mb-6">
            <label for="forgot-email" class="mb-2 block text-[15px] font-medium text-white">Email</label>
            <input
              id="forgot-email"
              type="email"
              required
              class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
            />
          </div>
          <button
            type="submit"
            class="login-btn w-full rounded-full bg-white py-3 text-[15px] font-bold tracking-wide text-[#1a0a2e] shadow-sm transition hover:bg-white/95 focus:outline-none focus:ring-2 focus:ring-white/60"
          >
            Send reset link
          </button>
        </form>
        <div id="forgot-dev-hint" class="mt-4 hidden rounded-lg border border-white/25 bg-black/20 p-3 text-[12px] text-white/95"></div>
        <p class="mt-6 text-center text-[14px] text-white">
          <button type="button" id="link-back-login-from-forgot" class="font-bold underline-offset-2 hover:underline">
            Back to login
          </button>
        </p>
      </div>
    </div>
    <script src="/login.js"></script>
  </body>
</html>
