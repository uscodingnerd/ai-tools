<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Montserrat", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      .login-bg {
        min-height: 100vh;
        background: linear-gradient(180deg, #d946ef 0%, #a21caf 22%, #7c3aed 55%, #a78bfa 82%, #c4d4ff 100%);
      }
    </style>
  </head>
  <body class="login-bg flex items-center justify-center px-5 py-8 font-sans antialiased">
    <div
      class="w-full max-w-[400px] rounded-[28px] border border-white/35 bg-white/[0.06] px-8 pb-9 pt-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)] backdrop-blur-[2px]"
    >
      <h1 class="mb-6 text-center text-[26px] font-bold tracking-tight text-white">Reset password</h1>
      <div
        id="msg"
        class="mb-4 hidden rounded-lg border border-white/30 bg-white/10 px-3 py-2 text-center text-[13px] text-white"
      ></div>
      <form id="form-reset" class="space-y-5">
        <input type="hidden" id="token" name="token" />
        <div>
          <label for="new-password" class="mb-2 block text-[15px] font-medium text-white">New password</label>
          <input
            id="new-password"
            type="password"
            required
            minlength="8"
            class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
          />
        </div>
        <div>
          <label for="new-password2" class="mb-2 block text-[15px] font-medium text-white">Confirm</label>
          <input
            id="new-password2"
            type="password"
            required
            minlength="8"
            class="w-full border-0 border-b border-white bg-transparent pb-2 text-[15px] text-white outline-none focus:border-white"
          />
        </div>
        <button
          type="submit"
          class="mt-6 w-full rounded-full bg-white py-3 text-[15px] font-bold tracking-wide text-[#1a0a2e] shadow-sm transition hover:bg-white/95"
        >
          Update password
        </button>
      </form>
      <p class="mt-6 text-center text-[14px] text-white">
        <a href="/login.html" class="font-bold underline-offset-2 hover:underline">Back to login</a>
      </p>
    </div>
    <script src="/reset-password.js"></script>
  </body>
</html>
